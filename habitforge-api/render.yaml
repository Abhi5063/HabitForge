services:
  - type: web
    name: habitforge-api
    env: node
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: node dist/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: habitforge-db
          property: connectionString
databases:
  - name: habitforge-db
    databaseName: habitforge
    user: habitforge
